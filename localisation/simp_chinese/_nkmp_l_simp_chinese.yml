 nkmp_about_mod_cat:0 "关于Niko的模组包"
 nkmp_about_mod_cat_desc:0 "\n        Niko的模组包（曾叫做终极作弊模组）自2018年2月开始一直为玩家服务。这个模组的历史可以一直追溯到1.5.0（唤醒猛虎）版本更新之前。在2019年推出了这个改进的新版本之后，此模组日渐不断更新。\n\n        我希望对所有自始至初支持和那些正在亦或将要加入我们的人说一声谢谢。对你们所有人致以我诚挚的§t爱意§!。\n\n    §2一些常见问题§! - §R 请全部阅读哦 §!\n\n- 如果你见到§R红色§!的文本，您需要将鼠标停在描述上并阅读该描述，它将警告您可能面临的问题。\n\n- 在使用本模组之前，您应该始终将鼠标停在作弊功能上并阅读描述。\n\n- 重新加载或者保存您的游戏存档可能会关闭作弊设定，并使得您不得不再次启动它们。请在读取存档后检查一下所有设置。\n\n- 游戏在单人模式和多人模式会自动切换模式。多人模式游玩时模组将为了平衡性而更改或禁用效果。你可以在主持游戏界面菜单将模组包放入单人模式。\n\n- 本模组将显示他所在的大型综合修改模组。如果它检测到作者的任意一个子模组，它将自动切换。否则将与平时一样。\n\n- 如果您有其他问题，请在创意工坊页面向我提出。\n\n模组包游戏模式 - [nkmp_modpack_game_mode_status] \n模组包综合修改模式 - [nkmp_modpack_mode] \n\n|版本 - §C4.0.0§! | 最新更新 - §G2024年11月14日§! |"
