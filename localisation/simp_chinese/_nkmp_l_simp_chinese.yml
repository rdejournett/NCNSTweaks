 cheat_about_mod_cat:0 "关于Niko的模组包"
 cheat_about_mod_cat_desc:0 "\n        Niko的模组包自2018年2月开始一直为玩家服务。这个模组的历史可以一直追溯到1.5.0（唤醒猛虎）版本更新之前。在2019年推出了这个改进的新版本之后，此模组不断扩张。\n\n        我希望对所有自始至初支持和那些正在亦或将要加入我们的人说一声谢谢。对你们所有人致以我诚挚的§t爱意§!。\n\n    §2一些常见问题§!\n- 如果你见到§R红色§!的文本，您需要将鼠标停在描述上并阅读该描述，它将警告您可能面临的问题。\n\n- 在使用本模组之前，您应该始终将鼠标停在作弊功能上并阅读描述。\n\n- 如果您有其他问题，请在创意工坊页面向我提出。\n\n\n§C版本 3.8.0 - 最新更新 2024年10月21日§!"
