 cheat_quickmenu_core_all_desc:0 "如果有个地区你已经拥有但并没有你的核心，此决议会给它制造核心。如果此按钮呈灰色则表明你已经拥有所控制地区的所有核心。\n\n§C 这功能只对你拥有的地区有用。此功能不适用于你在战争中控制的任意一个地块。\n\n§O AI仅会在他们是傀儡国，他们的宗主国是玩家，且您在快捷菜单中将此功能打开情况下使用。§!"
